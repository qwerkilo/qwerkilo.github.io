<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = ''
  if (newWindow === 'true') {
    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

</script>

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;h3 id=&#34;底层原理&#34;&gt;底层原理&lt;/h3&gt;
&lt;p&gt;&lt;strong&gt;Docker是如何工作的？&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;Docker是一个Client-Server结构的系统，Docker的守护进程运行在主机上。通过Socket从客户端访问。DockerServer接收到Docker-Client的指令，就会执行这个命令。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://cdn.jsdelivr.net/gh/qwerkilo/Image/20201227223543.png&#34; alt=&#34;image-20201227211300908&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;&lt;strong&gt;Docker为什么比VM快？&lt;/strong&gt;&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;Docker有着比虚拟机更少的抽象层。&lt;/li&gt;
&lt;li&gt;Docker利用的是宿主机的内核，VM需要Guest OS。&lt;/li&gt;
&lt;/ol&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://cdn.jsdelivr.net/gh/qwerkilo/Image/20201227223623.png&#34; alt=&#34;image-20201227211436505&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;blockquote&gt;
&lt;p&gt;所以说，新建一个容器的时候，Docker不需要像虚拟机一样重新加载一个操作系统的内核，避免引导。虚拟机是加载Guest OS，分钟级别的，而Docker是利用宿主机的操作系统，省略的这个复杂的过程，它是一个秒级的。&lt;/p&gt;

<script>
  // var escape = "[{&#34;content&#34;:&#34;&lt;h1 id=\&#34;docker教程\&#34;&gt;Docker教程&lt;/h1&gt;\n&lt;p&gt;[TOC]&lt;/p&gt;\n&lt;h2 id=\&#34;docker概述\&#34;&gt;Docker概述&lt;/h2&gt;\n&lt;h3 id=\&#34;docker为什么出现\&#34;&gt;Docker为什么出现？&lt;/h3&gt;\n&lt;p&gt;一款产品：开发--上线 两套环境 应用环境 应用配置&lt;/p&gt;\n&lt;p&gt;开发 --运维 ：环境不同的问题产生问题&lt;/p&gt;\n&lt;p&gt;环境配置很麻烦（集群Redis，ES，Hadoop...)&lt;/p&gt;\n&lt;p&gt;项目能不能带上环境安装打包--&amp;gt;Docker要做的事情&lt;/p&gt;\n&lt;p&gt;传统：开发jar，运维来做&lt;/p&gt;\n&lt;p&gt;现在：开发打包部署上线，一套流程做完&lt;/p&gt;\n&lt;p&gt;Docker给以上问题给出了解决方案。&lt;/p&gt;\n&lt;p&gt;下载Docker镜像运行即可，运维不需要考虑运行环境，Docker思想来自于集装箱&lt;/p&gt;\n&lt;p&gt;隔离：Docker核心思想。打包装箱，每个箱子是互相隔离的&lt;/p&gt;\n&lt;p&gt;本质：所有的技术都是因为出现了一些问题我们需要去解决才出现的&lt;/p&gt;\n&lt;h3 id=\&#34;docker能做什么\&#34;&gt;Docker能做什么&lt;/h3&gt;\n&lt;p&gt;虚拟化技术：资源占用十分多，冗余步骤多，启动慢&lt;/p&gt;\n&lt;p&gt;容器化技术：不是模拟的一个完整的操作系统&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;传统虚拟机，虚拟出一套硬件，运行一个完整的操作系统，然后安装和运行软件&lt;/li&gt;\n&lt;li&gt;容器内的应用直接运行在宿主机的内容，容器是没有自己的内核的&lt;/li&gt;\n&lt;li&gt;每个容器内都有一个属于自己的文件系统&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;DevOps（开发，运维）&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;&lt;strong&gt;更快速的交付和部署&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;传统：一堆帮助文档，安装程序&lt;/p&gt;\n&lt;p&gt;Docker：打包镜像发布测试一键运行&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;更便捷的升级和扩容&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;使用Docker之后，我们部署应用就和搭积木一样&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;更简单的系统运维&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;容器化后，开发和测试环境都是高度一致的&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;更高效的计算资源利用&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Docker是内核级别的虚拟化，可以在一个物理机上运行很多容器实例，服务器性能可以被压榨到极致&lt;/p&gt;\n&lt;h2 id=\&#34;docker安装\&#34;&gt;Docker安装&lt;/h2&gt;\n&lt;h3 id=\&#34;docker的基本组成\&#34;&gt;Docker的基本组成&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;镜像（image）:&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Docker镜像就好比一个模板，可以通过这个模板来创建容器服务，创建多个容器。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;容器(container)：&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;通过镜像创建的，启动，停止，删除等基本命令。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;仓库（repository)：&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;仓库就是存放镜像的地方，分公有仓库与私有仓库。&lt;/p&gt;\n&lt;p&gt;Docker Hub，阿里云（配置镜像加速）&lt;/p&gt;\n&lt;h3 id=\&#34;安装docker\&#34;&gt;安装Docker&lt;/h3&gt;\n&lt;p&gt;安装过程略过&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-shell\&#34;&gt;#查看当前系统版本\n[root@localhost ~]# cat /etc/os-release\nNAME=&amp;quot;CentOS Linux&amp;quot;\nVERSION=&amp;quot;8&amp;quot;\nID=&amp;quot;centos&amp;quot;\nID_LIKE=&amp;quot;rhel fedora&amp;quot;\nVERSION_ID=&amp;quot;8&amp;quot;\nPLATFORM_ID=&amp;quot;platform:el8&amp;quot;\nPRETTY_NAME=&amp;quot;CentOS Linux 8&amp;quot;\nANSI_COLOR=&amp;quot;0;31&amp;quot;\nCPE_NAME=&amp;quot;cpe:/o:centos:centos:8&amp;quot;\nHOME_URL=&amp;quot;https://centos.org/&amp;quot;\nBUG_REPORT_URL=&amp;quot;https://bugs.centos.org/&amp;quot;\nCENTOS_MANTISBT_PROJECT=&amp;quot;CentOS-8&amp;quot;\nCENTOS_MANTISBT_PROJECT_VERSION=&amp;quot;8&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-shell\&#34;&gt;#查看当前docker版本\n[root@localhost ~]# docker version\nEmulate Docker CLI using podman. Create /etc/containers/nodocker to quiet msg.\nVersion:      2.0.5\nAPI Version:  1\nGo Version:   go1.14.7\nBuilt:        Thu Sep 24 13:58:13 2020\nOS/Arch:      linux/amd64\n&lt;/code&gt;&lt;/pre&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-shell\&#34;&gt;#运行hello-world镜像\n[root@localhost ~]# docker run hello-world\nEmulate Docker CLI using podman. Create /etc/containers/nodocker to quiet msg.\nTrying to pull registry.access.redhat.com/hello-world...\n  name unknown: Repo not found\nTrying to pull registry.redhat.io/hello-world...\n  unable to retrieve auth token: invalid username/password: unauthorized: Please login to the Red Hat Registry using your Customer Portal credentials. Further instructions can be found here: https://access.redhat.com/RegistryAuthentication\nTrying to pull docker.io/library/hello-world...\nGetting image source signatures\nCopying blob 0e03bdcc26d7 done\nCopying config bf756fb1ae done\nWriting manifest to image destination\nStoring signatures\n\nHello from Docker!\nThis message shows that your installation appears to be working correctly.\n\nTo generate this message, Docker took the following steps:\n 1. The Docker client contacted the Docker daemon.\n 2. The Docker daemon pulled the &amp;quot;hello-world&amp;quot; image from the Docker Hub.\n    (amd64)\n 3. The Docker daemon created a new container from that image which runs the\n    executable that produces the output you are currently reading.\n 4. The Docker daemon streamed that output to the Docker client, which sent it\n    to your terminal.\n\nTo try something more ambitious, you can run an Ubuntu container with:\n $ docker run -it ubuntu bash\n\nShare images, automate workflows, and more with a free Docker ID:\n https://hub.docker.com/\n\nFor more examples and ideas, visit:\n https://docs.docker.com/get-started/\n\n&lt;/code&gt;&lt;/pre&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-shell\&#34;&gt;#查看当前仓库的镜像\n[root@localhost ~]# docker images\nEmulate Docker CLI using podman. Create /etc/containers/nodocker to quiet msg.\nREPOSITORY                     TAG     IMAGE ID      CREATED        SIZE\ndocker.io/library/hello-world  latest  bf756fb1ae65  11 months ago  20 kB\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;回顾hello-world的过程\&#34;&gt;回顾hello world的过程&lt;/h3&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/qwerkilo/Image/20201227223450.png\&#34; alt=\&#34;image-20201227212403146\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;ol&gt;\n&lt;li&gt;开始run&lt;/li&gt;\n&lt;li&gt;在本机寻找镜像&lt;/li&gt;\n&lt;li&gt;判断本机是否有这个镜像\n&lt;ul&gt;\n&lt;li&gt;有，用本机的&lt;/li&gt;\n&lt;li&gt;没有，去Docker Hub上下载\n&lt;ul&gt;\n&lt;li&gt;找到镜像，下载镜像到本地&lt;/li&gt;\n&lt;li&gt;找不到，回错误&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;运行&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3 id=\&#34;底层原理\&#34;&gt;底层原理&lt;/h3&gt;\n&lt;p&gt;&lt;strong&gt;Docker是如何工作的？&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;Docker是一个Client-Server结构的系统，Docker的守护进程运行在主机上。通过Socket从客户端访问。DockerServer接收到Docker-Client的指令，就会执行这个命令。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/qwerkilo/Image/20201227223543.png\&#34; alt=\&#34;image-20201227211300908\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;&lt;strong&gt;Docker为什么比VM快？&lt;/strong&gt;&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;Docker有着比虚拟机更少的抽象层。&lt;/li&gt;\n&lt;li&gt;Docker利用的是宿主机的内核，VM需要Guest OS。&lt;/li&gt;\n&lt;/ol&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;3\&#34;&gt;&lt;img src=\&#34;https://cdn.jsdelivr.net/gh/qwerkilo/Image/20201227223623.png\&#34; alt=\&#34;image-20201227211436505\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;blockquote&gt;\n&lt;p&gt;所以说，新建一个容器的时候，Docker不需要像虚拟机一样重新加载一个操作系统的内核，避免引导。虚拟机是加载Guest OS，分钟级别的，而Docker是利用宿主机的操作系统，省略的这个复杂的过程，它是一个秒级的。&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;&lt;/th&gt;\n&lt;th&gt;Docker容器&lt;/th&gt;\n&lt;th&gt;LXC&lt;/th&gt;\n&lt;th&gt;VM&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;虚拟化类型&lt;/td&gt;\n&lt;td&gt;OS虚拟化&lt;/td&gt;\n&lt;td&gt;OS虚拟化&lt;/td&gt;\n&lt;td&gt;硬件虚拟化&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;性能&lt;/td&gt;\n&lt;td&gt;=物理机性能&lt;/td&gt;\n&lt;td&gt;=物理机性能&lt;/td&gt;\n&lt;td&gt;5%-20%损耗&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;隔离性&lt;/td&gt;\n&lt;td&gt;NS隔离&lt;/td&gt;\n&lt;td&gt;NS隔离&lt;/td&gt;\n&lt;td&gt;强&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;QoS&lt;/td&gt;\n&lt;td&gt;Cgroup弱&lt;/td&gt;\n&lt;td&gt;Cgroup弱&lt;/td&gt;\n&lt;td&gt;强&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;安全性&lt;/td&gt;\n&lt;td&gt;中&lt;/td&gt;\n&lt;td&gt;差&lt;/td&gt;\n&lt;td&gt;强&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;GuestOS&lt;/td&gt;\n&lt;td&gt;只支持Linux&lt;/td&gt;\n&lt;td&gt;只支持Linux&lt;/td&gt;\n&lt;td&gt;全部&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;可迁移性&lt;/td&gt;\n&lt;td&gt;强&lt;/td&gt;\n&lt;td&gt;弱&lt;/td&gt;\n&lt;td&gt;强&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&#34;,&#34;fileName&#34;:&#34;ce-shi&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;测试&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-12-27 22:53:25&#34;,&#34;dateFormat&#34;:&#34;2020-12-27&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://qwerkilo.github.io/post/ce-shi/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;6 min read&#34;,&#34;time&#34;:335000,&#34;words&#34;:1290,&#34;minutes&#34;:6},&#34;description&#34;:&#34;Docker教程\n[TOC]\nDocker概述\nDocker为什么出现？\n一款产品：开发--上线 两套环境 应用环境 应用配置\n开发 --运维 ：环境不同的问题产生问题\n环境配置很麻烦（集群Redis，ES，Hadoop...)\n项目能不能...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#docker%E6%95%99%E7%A8%8B\&#34;&gt;Docker教程&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#docker%E6%A6%82%E8%BF%B0\&#34;&gt;Docker概述&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#docker%E4%B8%BA%E4%BB%80%E4%B9%88%E5%87%BA%E7%8E%B0\&#34;&gt;Docker为什么出现？&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#docker%E8%83%BD%E5%81%9A%E4%BB%80%E4%B9%88\&#34;&gt;Docker能做什么&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#docker%E5%AE%89%E8%A3%85\&#34;&gt;Docker安装&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#docker%E7%9A%84%E5%9F%BA%E6%9C%AC%E7%BB%84%E6%88%90\&#34;&gt;Docker的基本组成&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%AE%89%E8%A3%85docker\&#34;&gt;安装Docker&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9B%9E%E9%A1%BEhello-world%E7%9A%84%E8%BF%87%E7%A8%8B\&#34;&gt;回顾hello world的过程&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BA%95%E5%B1%82%E5%8E%9F%E7%90%86\&#34;&gt;底层原理&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;}]";
